name: Yocto build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yocto-build-state
  cancel-in-progress: false

jobs:
  build:
    name: build Yocto image
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2
        with:
          path: boGate
          persist-credentials: false

      - name: Setup venv
        working-directory: boGate
        shell: bash
        run: python3 -m venv .venv

      - name: Install kas
        working-directory: boGate
        shell: bash
        run: |
          . .venv/bin/activate
          pip install kas

      - name: Build image
        working-directory: boGate
        shell: bash
        run: |
          . .venv/bin/activate
          export DL_DIR=/home/bobo/boGate/build/downloads
          export SSTATE_DIR=/home/bobo/boGate/build/sstate-cache
          export BB_ENV_PASSTHROUGH_ADDITIONS="$BB_ENV_PASSTHROUGH_ADDITIONS DL_DIR SSTATE_DIR"
          kas-container build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: boGate
          if-no-files-found: error
          path: boGate/build/tmp/deploy/images/raspberrypi4-64
