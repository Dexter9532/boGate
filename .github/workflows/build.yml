name: Yocto build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yocto-build-state
  cancel-in-progress: false

jobs:
  build:
    name: build Yocto image
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2
        with:
          path: boGate
          persist-credentials: false

      - name: Setup venv
        working-directory: boGate
        shell: bash
        run: python3 -m venv .venv

      - name: Install kas
        working-directory: boGate
        shell: bash
        run: |
          . .venv/bin/activate
          pip install kas

      - name: Restore build state
        shell: bash
        run: |
          mkdir -p boGate/build
          rsync -a /home/bobo/boGate/build/conf/ boGate/build/conf/
          rsync -a /home/bobo/boGate/build/downloads/ boGate/build/downloads/
          rsync -a /home/bobo/boGate/build/sstate-cache/ boGate/build/sstate-cache/

      - name: Build image
        working-directory: boGate
        shell: bash
        run: |
          . .venv/bin/activate
          kas-container build meta-bogate/kas/firmware.yml

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: boGate
          if-no-files-found: error
          path: boGate/build/tmp/deploy/images/raspberrypi4-64
